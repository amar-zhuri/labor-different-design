          <h1>Laboratori Labor - Analiza të Gjakut dhe Shërbime Mjekësore në Prizren</h1>
          <p>Analiza profesionale të gjakut dhe shërbime mjekësore me mbi 25 vjet eksperiencë në Prizren, Kosovë</p>
        </header>
        
        <section>
          <h2>Rreth Laboratorit Labor</h2>
          <p>Laboratori Labor është një institucion mjekësor i specializuar që ofron analiza të gjakut dhe shërbime diagnostike në Prizren, Kosovë. Me mbi 25 vjet eksperiencë, ne kemi kryer mbi 500,000 teste me 99.6% saktësi, duke u bërë partneri i besueshëm për shëndetin e komunitetit tonë.</p>
          <p>Jemi të licensuar dhe të certifikuar nga Autoritetet Shëndetësore të Kosovës dhe përdorim teknologjinë më të avancuar nga kompanitë lider botërore si Roche, Abbott, Siemens dhe Sysmex.</p>
        </section>
        
        <section>
          <h2>Shërbimet Tona</h2>
          <h3>Analiza të Specializuara</h3>
          <ul>
            <li><strong>Analiza e Gjakut të Plotë:</strong> Analiza komplekse që përfshijnë numërimin e qelizave, nivelet e hemoglobinës dhe parametra të tjerë të rëndësishëm</li>
            <li><strong>Profili Kardiak:</strong> Teste për vlerësimin e shëndetit të zemrës, kolesterolit dhe triglicerideve</li>
            <li><strong>Teste Hormonale:</strong> Analiza të nivelit të hormoneve për diagnostikimin e çrregullimeve endokrine</li>
            <li><strong>Biokimia Klinike:</strong> Analiza të enzimave, proteinave dhe substancave kimike në gjak</li>
            <li><strong>Teste për Sëmundje Infektive:</strong> Diagnostikim për HIV, Hepatit A/B/C dhe sëmundje të tjera infektive</li>
            <li><strong>Markerë Tumoralë:</strong> Teste të specializuara për zbulimin e hershëm të kancerit</li>
            <li><strong>Panele Alergjike:</strong> Identifikimi i alergjive të ndryshme</li>
            <li><strong>Paneli i Diabetit:</strong> HbA1c, toleranca e glukozës, nivelet e insulinës</li>
            <li><strong>Paneli i Tiroideës:</strong> TSH, T3, T4, antitrupat Anti-TPO</li>
            <li><strong>Vitamina & Minerale:</strong> B12, D3, Hekur, Folate dhe minerale thelbësore</li>
            <li><strong>Sëmundje Autoimmune:</strong> ANA, RF, Anti-CCP dhe markerë autoimmunë</li>
            <li><strong>Metale të Rënda:</strong> Testim për plumb, merkur, kadmium dhe metale toksike</li>
            <li><strong>Analiza e Urinës:</strong> Testim i plotë për vlerësimin e funksionit të veshkave</li>
          </ul>
          <p><strong>Rezultate Elektronike 24/7:</strong> Pacientët mund të lexojnë rezultatet e tyre online në çdo kohë nga telefoni, tableti ose kompjuteri.</p>
        </section>
        
        <section>
          <h2>Teknologjia dhe Cilësia</h2>
          <p>Investojmë në teknologjinë më të re për të siguruar rezultate të sakta dhe të shpejta:</p>
          <ul>
            <li><strong>Roche:</strong> Sisteme të avancuara për analizë biokimike dhe imunologjike</li>
            <li><strong>Abbott:</strong> Teknologji moderne për diagnostikim të saktë</li>
            <li><strong>Siemens:</strong> Pajisje semi-automatike për rezultate të besueshme</li>
            <li><strong>Sysmex:</strong> Teknologji lider botërore për analizën e gjakut dhe hematologji</li>
          </ul>
          <p>Pjesëmarrje në programe ndërkombëtare të kontrollit të cilësisë dhe procese të certifikuara të sigurimit të cilësisë.</p>
        </section>
